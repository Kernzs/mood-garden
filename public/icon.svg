<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3df" />
      <stop offset="100%" stop-color="#d8f0dc" />
    </linearGradient>
    <linearGradient id="pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd2ba" />
      <stop offset="100%" stop-color="#ffbd9c" />
    </linearGradient>
  </defs>

  <!-- fond plein (compatible maskable) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)" />

  <!-- soleil -->
  <circle cx="392" cy="132" r="52" fill="#ffc94d" opacity="0.35" />
  <circle cx="392" cy="132" r="34" fill="#ffc94d" />

  <!-- colline -->
  <path d="M0 372 Q256 322 512 372 L512 512 L0 512 Z" fill="#c7ebc9" />

  <!-- tige + feuilles + fleur -->
  <g stroke-linecap="round">
    <path d="M256 344 Q244 268 256 206" stroke="#6fbf73" stroke-width="13" fill="none" />
    <g transform="translate(232 286) rotate(24)">
      <ellipse rx="26" ry="13" fill="#6fbf73" />
    </g>
    <g transform="translate(280 274) rotate(-24)">
      <ellipse rx="26" ry="13" fill="#6fbf73" />
    </g>
  </g>

  <!-- fleur -->
  <g transform="translate(256 196)">
    <g fill="#ffc0d8">
      <ellipse cx="0" cy="-18" rx="13" ry="20" />
      <ellipse cx="0" cy="-18" rx="13" ry="20" transform="rotate(72)" />
      <ellipse cx="0" cy="-18" rx="13" ry="20" transform="rotate(144)" />
      <ellipse cx="0" cy="-18" rx="13" ry="20" transform="rotate(216)" />
      <ellipse cx="0" cy="-18" rx="13" ry="20" transform="rotate(288)" />
    </g>
    <circle r="13" fill="#ffc94d" />
  </g>

  <!-- pot -->
  <g>
    <rect x="192" y="322" width="128" height="28" rx="14" fill="url(#pot)" />
    <path d="M202 350 L310 350 L296 436 Q256 452 216 436 Z" fill="url(#pot)" />
    <ellipse cx="256" cy="336" rx="52" ry="9" fill="#7a4a34" opacity="0.28" />
  </g>
</svg>
